<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trivia Información Financiera</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#050a3d;
    --tile-navy:#0e1878;
    --tile-navy-light:#141f8c;
    --border-black:#000000;
    --gold:#e5b93e;
    --gold-light:#f2cf6e;
    --white:#f4f6ff;
    --text-dim:#8f9ad0;
    --red-stamp:#c0392b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 50% -10%, #101c99 0%, transparent 55%),
      var(--bg-deep);
    color:var(--white);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding:22px 18px 60px;
  }

  .wrap{max-width:1200px; margin:0 auto; position:relative;}

  /* ---------- HEADER ---------- */
  header{
    text-align:center;
    margin-bottom:22px;
    position:relative;
  }
  .eyebrow{
    font-family:'Space Mono', monospace;
    letter-spacing:.35em;
    font-size:11px;
    color:var(--text-dim);
    text-transform:uppercase;
  }
  h1{
    font-family:'Archivo Black', sans-serif;
    font-weight:400;
    font-size:clamp(30px, 4.6vw, 50px);
    margin:8px 0 4px;
    color:var(--gold);
    text-shadow:0 3px 0 #000, 0 3px 10px rgba(0,0,0,.5);
    letter-spacing:.01em;
    text-transform:uppercase;
  }
  .subtitle{
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:13px;
    color:var(--text-dim);
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .reset-btn{
    position:absolute; top:0; right:0;
    background:transparent;
    border:1px solid rgba(229,185,62,.4);
    color:var(--text-dim);
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:11px;
    letter-spacing:.08em;
    padding:7px 12px;
    border-radius:3px;
    cursor:pointer;
    transition:all .15s ease;
    text-transform:uppercase;
  }
  .reset-btn:hover{border-color:var(--gold); color:var(--gold-light);}

  /* ---------- TURN BAR (kept as approved) ---------- */
  .turn-bar{
    display:flex; align-items:center; justify-content:center; gap:18px;
    background:linear-gradient(180deg, var(--tile-navy-light), var(--tile-navy));
    border:1px solid rgba(229,185,62,.35);
    border-radius:10px;
    padding:14px 22px;
    margin-bottom:22px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 6px 18px rgba(0,0,0,.45);
  }
  .turn-label{
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:12px;
    letter-spacing:.15em;
    color:var(--text-dim);
    text-transform:uppercase;
  }
  .turn-coin{
    width:46px; height:46px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--gold-light), var(--gold) 60%, #8a6f1c 100%);
    display:flex; align-items:center; justify-content:center;
    font-family:'Archivo Black', sans-serif;
    color:#241d0f;
    font-size:16px;
    box-shadow:0 3px 8px rgba(0,0,0,.4), inset 0 -3px 4px rgba(0,0,0,.2), inset 0 2px 3px rgba(255,255,255,.4);
    flex:none;
    animation:coinSpin .5s ease;
  }
  @keyframes coinSpin{ from{transform:rotateY(180deg);} to{transform:rotateY(0);} }
  .turn-name{
    font-family:'Archivo Black', sans-serif;
    font-size:22px;
    color:var(--gold-light);
    text-transform:uppercase;
  }
  .next-btn{
    background:var(--gold);
    color:#241d0f;
    border:none;
    font-family:'Inter', sans-serif;
    font-weight:800;
    font-size:12px;
    letter-spacing:.08em;
    padding:10px 16px;
    border-radius:6px;
    cursor:pointer;
    text-transform:uppercase;
    transition:transform .12s ease, background .15s ease;
  }
  .next-btn:hover{background:var(--gold-light); transform:translateY(-1px);}
  .next-btn:active{transform:translateY(0);}

  /* ---------- BOARD (classic tv-trivia grid) ---------- */
  .board{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:6px;
    margin-bottom:26px;
    background:var(--border-black);
    padding:6px;
    border-radius:8px;
  }
  .col-head{
    font-family:'Archivo Black', sans-serif;
    font-weight:400;
    font-size:14px;
    text-align:center;
    color:var(--white);
    background:linear-gradient(180deg, var(--tile-navy-light), var(--tile-navy));
    padding:14px 6px;
    min-height:66px;
    display:flex; align-items:center; justify-content:center;
    line-height:1.2;
    text-transform:uppercase;
    text-shadow:0 2px 0 #000;
    letter-spacing:.01em;
  }

  .coin-cell{
    background:linear-gradient(180deg, var(--tile-navy-light), var(--tile-navy));
    height:80px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Archivo Black', sans-serif;
    font-weight:400;
    font-size:26px;
    color:var(--gold);
    cursor:pointer;
    position:relative;
    text-shadow:0 3px 0 #000;
    transition:transform .12s ease, background .15s ease;
  }
  .coin-cell:hover:not(.used){
    background:linear-gradient(180deg, #1826a8, var(--tile-navy-light));
    transform:scale(1.02);
  }
  .coin-cell.used{
    cursor:default;
    background:linear-gradient(180deg, #0a1050, #060a38);
    color:transparent;
  }

  /* ---------- SCOREBOARD ---------- */
  .scoreboard{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:12px;
  }
  .team-card{
    background:linear-gradient(180deg, var(--tile-navy-light), var(--tile-navy));
    border:1px solid rgba(229,185,62,.3);
    border-radius:10px;
    padding:14px 10px 12px;
    text-align:center;
    position:relative;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  .team-card.active{
    border-color:var(--gold);
    box-shadow:0 0 0 1px var(--gold), 0 8px 20px rgba(229,185,62,.25);
  }
  .team-card.active::before{
    content:"TURNO";
    position:absolute; top:-10px; left:50%; transform:translateX(-50%) rotate(-4deg);
    background:var(--red-stamp);
    color:#f7ece2;
    font-family:'Inter', sans-serif;
    font-weight:800;
    font-size:9.5px;
    letter-spacing:.12em;
    padding:2px 8px;
    border-radius:3px;
    box-shadow:0 3px 6px rgba(0,0,0,.4);
  }
  .team-name{
    font-family:'Archivo Black', sans-serif;
    font-weight:400;
    font-size:15px;
    color:var(--white);
    margin-bottom:4px;
    text-transform:uppercase;
  }
  .team-score{
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size:22px;
    color:var(--gold-light);
    margin-bottom:8px;
  }
  .team-adjust{display:flex; justify-content:center; gap:6px;}
  .adjust-btn{
    width:26px; height:26px;
    border-radius:50%;
    border:1px solid rgba(229,185,62,.5);
    background:transparent;
    color:var(--text-dim);
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    line-height:1;
    transition:all .15s ease;
  }
  .adjust-btn:hover{background:var(--gold); color:#241d0f; border-color:var(--gold);}

  footer{
    text-align:center;
    margin-top:28px;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:.05em;
    text-transform:uppercase;
  }

  /* ---------- MODAL ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(2,5,25,.82);
    display:none;
    align-items:center; justify-content:center;
    z-index:50;
    padding:20px;
  }
  .overlay.show{display:flex;}
  .card{
    background:linear-gradient(180deg, var(--tile-navy-light), var(--tile-navy));
    color:var(--white);
    max-width:640px; width:100%;
    border-radius:10px;
    padding:34px 34px 28px;
    position:relative;
    box-shadow:0 30px 60px rgba(0,0,0,.6);
    border:1px solid rgba(229,185,62,.4);
  }
  .close-x{
    position:absolute; top:12px; right:16px;
    background:none; border:none;
    font-size:20px; color:var(--text-dim);
    cursor:pointer;
    font-family:'Inter', sans-serif;
  }
  .card-tag{
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:12px;
    letter-spacing:.1em;
    color:var(--text-dim);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .card-points{
    font-family:'Archivo Black', sans-serif;
    font-weight:400;
    font-size:32px;
    color:var(--gold);
    margin-bottom:16px;
    text-shadow:0 2px 0 #000;
  }
  .card-q{
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-style:normal;
    font-size:19px;
    line-height:1.5;
    color:var(--white);
    margin-bottom:18px;
  }
  .reveal-btn{
    background:var(--gold);
    color:#241d0f;
    border:none;
    font-family:'Inter', sans-serif;
    font-weight:800;
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    padding:11px 18px;
    border-radius:5px;
    cursor:pointer;
    margin-bottom:6px;
  }
  .reveal-btn:hover{background:var(--gold-light);}
  .answer-box{
    display:none;
    background:rgba(0,0,0,.25);
    border:1px dashed rgba(229,185,62,.5);
    border-radius:6px;
    padding:14px 16px;
    margin-bottom:18px;
  }
  .answer-box.show{display:block;}
  .answer-label{
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:11px;
    letter-spacing:.1em;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .answer-text{
    font-family:'Inter', sans-serif;
    font-weight:400;
    font-size:16.5px;
    line-height:1.5;
    color:var(--white);
  }
  .award-section{display:none;}
  .award-section.show{display:block;}
  .award-label{
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:11.5px;
    letter-spacing:.08em;
    color:var(--text-dim);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .award-grid{
    display:flex; flex-wrap:wrap; gap:8px;
    margin-bottom:10px;
  }
  .award-btn{
    background:rgba(229,185,62,.15);
    border:1px solid rgba(229,185,62,.5);
    color:var(--gold-light);
    font-family:'Inter', sans-serif;
    font-weight:700;
    font-size:12.5px;
    padding:9px 13px;
    border-radius:5px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .award-btn:hover{background:var(--gold); color:#241d0f;}
  .skip-btn{
    background:transparent;
    border:1px solid var(--text-dim);
    color:var(--text-dim);
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:12px;
    padding:9px 13px;
    border-radius:5px;
    cursor:pointer;
  }
  .skip-btn:hover{border-color:var(--red-stamp); color:#e07567;}

  @media (max-width:820px){
    .board{grid-template-columns:repeat(5,1fr); gap:4px;}
    .col-head{font-size:10px; padding:8px 3px; min-height:52px;}
    .coin-cell{height:52px; font-size:16px;}
    .scoreboard{grid-template-columns:repeat(2,1fr); gap:8px;}
    h1{font-size:26px;}
    .turn-bar{flex-wrap:wrap; gap:10px; padding:12px;}
    .turn-name{font-size:18px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <button class="reset-btn" onclick="resetGame()">↺ Reiniciar juego</button>
    <div class="eyebrow">Trivia por equipos</div>
    <h1>Trivia Información Financiera</h1>
    <div class="subtitle">Equipos 2 al 6</div>
  </header>

  <div class="turn-bar">
    <div class="turn-label">Turno actual</div>
    <div class="turn-coin" id="turnCoin">$</div>
    <div class="turn-name" id="turnName">Equipo 2</div>
    <button class="next-btn" onclick="nextTurn()">Pasar turno →</button>
  </div>

  <div class="board" id="board"></div>

  <div class="scoreboard" id="scoreboard"></div>

  <footer>Clic en una casilla para revelar la pregunta · el marcador se reinicia al recargar la página</footer>
</div>

<div class="overlay" id="overlay">
  <div class="card">
    <button class="close-x" onclick="closeModal()">✕</button>
    <div class="card-tag" id="cardTag">Categoría</div>
    <div class="card-points" id="cardPoints">$100</div>
    <div class="card-q" id="cardQ">Pregunta...</div>
    <button class="reveal-btn" id="revealBtn" onclick="revealAnswer()">Mostrar respuesta</button>
    <div class="answer-box" id="answerBox">
      <div class="answer-label">Respuesta correcta</div>
      <div class="answer-text" id="answerText"></div>
    </div>
    <div class="award-section" id="awardSection">
      <div class="award-label">¿Qué equipo acertó?</div>
      <div class="award-grid" id="awardGrid"></div>
      <button class="skip-btn" onclick="resolveCell(null)">Nadie acertó — continuar</button>
    </div>
  </div>
</div>

<script>
const categories = [
  {
    name:"Contexto Financiero",
    questions:[
      {points:100, q:"¿Cuál es el objetivo de las entidades lucrativas?", a:"Obtener una utilidad (ganancia) mediante la prestación de servicios, manufactura y/o comercialización de bienes."},
      {points:200, q:"Menciona los 4 tipos de empresas según su operación.", a:"Empresas de servicios, de comercialización de bienes, de transformación o manufactureras, y de giros especializados."},
      {points:300, q:"¿Qué organismo en México supervisa el mercado de valores?", a:"La Comisión Nacional Bancaria y de Valores (CNBV)."},
      {points:400, q:"¿Cuál es la diferencia principal entre auditoría interna y auditoría externa?", a:"La auditoría interna la realiza personal de la propia empresa para verificar sus controles; la externa la realiza un auditor ajeno a la empresa, garantizando una opinión profesional e independiente."},
      {points:500, q:"Explica las 3 categorías de decisiones financieras y da un ejemplo de cada una.", a:"Financiamiento: de dónde obtener recursos (ej. pedir un préstamo). Inversión: en qué aplicar los recursos (ej. comprar maquinaria). Operación: qué hacer con las inversiones (ej. definir el precio de venta)."}
    ]
  },
  {
    name:"Ecuación Contable",
    questions:[
      {points:100, q:"Escribe la ecuación contable.", a:"Activo = Pasivo + Capital."},
      {points:200, q:"Define Activo.", a:"Son todos los bienes y derechos propiedad de la empresa; recursos que se espera generen beneficios económicos futuros."},
      {points:300, q:"Define Pasivo.", a:"Son las deudas y obligaciones de la empresa con terceras personas (proveedores, acreedores, bancos, etc.)."},
      {points:400, q:"¿De qué dos elementos se integra el Capital?", a:"De las aportaciones de los socios (Capital Social) y de las utilidades o pérdidas generadas por el negocio."},
      {points:500, q:"Una empresa inicia con una aportación de los socios de $500,000 en efectivo y compra mercancía a crédito por $150,000. ¿Cuál es el total del Activo y del Pasivo?", a:"Activo = $650,000 (Bancos $500,000 + Almacén $150,000). Pasivo = $150,000 (Proveedores). Capital = $500,000."}
    ]
  },
  {
    name:"Clasificación de Cuentas",
    questions:[
      {points:100, q:"¿Qué es el Activo Circulante?", a:"Partidas que representan efectivo o que se espera se conviertan en efectivo, se vendan o se consuman en un plazo no mayor a un año."},
      {points:200, q:"Da un ejemplo de Activo No Circulante.", a:"Propiedad, Planta y Equipo (terrenos, edificios, maquinaria) o Intangibles (gastos de instalación, marcas, patentes), entre otros."},
      {points:300, q:"¿Cuál es la diferencia entre Pasivo Circulante y Pasivo No Circulante?", a:"El Pasivo Circulante vence dentro de un año; el Pasivo No Circulante vence en un plazo mayor a un año."},
      {points:400, q:"¿En qué dos rubros se clasifica el Capital?", a:"Capital Aportado (Capital Social) y Capital Ganado (utilidades o pérdidas del ejercicio y de ejercicios anteriores)."},
      {points:500, q:"Clasifica esta cuenta: “Documentos por pagar a largo plazo”.", a:"Pasivo No Circulante."}
    ]
  },
  {
    name:"Estado de Resultados",
    questions:[
      {points:100, q:"¿Cómo se le llamaba antes al Estado de Resultados?", a:"Estado de Pérdidas y Ganancias."},
      {points:200, q:"¿Cómo se calcula la Utilidad Bruta?", a:"Ventas Netas menos Costo de Ventas."},
      {points:300, q:"¿Qué se resta a las Ventas para obtener las Ventas Netas?", a:"Las Devoluciones sobre Ventas y las Rebajas y Descuentos sobre Ventas."},
      {points:400, q:"¿Cómo se determina el Costo de Ventas?", a:"Inventario Inicial + Compras Netas − Inventario Final = Costo de Ventas."},
      {points:500, q:"Caso Pluma de Ganso: las Ventas del mes fueron $557,500, las Devoluciones sobre Ventas $12,000 y las Rebajas y Descuentos $2,750. ¿Cuáles son las Ventas Netas?", a:"$542,750 (557,500 − 12,000 − 2,750)."}
    ]
  },
  {
    name:"Flujo de Efectivo",
    questions:[
      {points:100, q:"¿Qué muestra el Estado de Flujo de Efectivo?", a:"Los recursos generados o utilizados en la operación y su reflejo final en el efectivo e inversiones temporales durante un periodo."},
      {points:200, q:"¿Cuáles son las 3 actividades que agrupa el Estado de Flujo de Efectivo?", a:"Actividades de Operación, de Inversión y de Financiamiento."},
      {points:300, q:"En el Estado de Origen y Aplicación de Recursos, ¿qué representa una disminución de Activo?", a:"Un origen de recursos."},
      {points:400, q:"¿Qué se incluye en las Actividades de Financiamiento?", a:"La obtención de recursos de los accionistas (capital), créditos bancarios y pasivo no circulante, así como su reembolso o pago."},
      {points:500, q:"Caso Pluma de Ganso: la cuenta Proveedores pasó de $260,720 (mayo) a $216,920 (junio). ¿Es un origen o una aplicación de recursos, y de cuánto?", a:"Es una aplicación de recursos por $43,800, porque el pasivo disminuyó."}
    ]
  }
];

const teams = ["Equipo 2","Equipo 3","Equipo 4","Equipo 5","Equipo 6"];
let scores = {};
teams.forEach(t => scores[t] = 0);
let turnIndex = 0;
let currentCell = null;

function renderBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  categories.forEach((cat) => {
    const head = document.createElement('div');
    head.className = 'col-head';
    head.textContent = cat.name;
    board.appendChild(head);
  });
  for(let qIdx=0; qIdx<5; qIdx++){
    categories.forEach((cat, catIdx) => {
      const q = cat.questions[qIdx];
      const cell = document.createElement('div');
      cell.className = 'coin-cell';
      cell.textContent = '$' + q.points;
      cell.id = `cell-${catIdx}-${qIdx}`;
      cell.onclick = () => openModal(catIdx, qIdx, cell);
      board.appendChild(cell);
    });
  }
}

function renderScoreboard(){
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  teams.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'team-card' + (i === turnIndex ? ' active' : '');
    card.innerHTML = `
      <div class="team-name">${t}</div>
      <div class="team-score">$${scores[t]}</div>
      <div class="team-adjust">
        <button class="adjust-btn" onclick="adjustScore('${t}', -100)">−</button>
        <button class="adjust-btn" onclick="adjustScore('${t}', 100)">+</button>
      </div>`;
    sb.appendChild(card);
  });
  document.getElementById('turnName').textContent = teams[turnIndex];
}

function adjustScore(team, delta){
  scores[team] += delta;
  renderScoreboard();
}

function nextTurn(){
  turnIndex = (turnIndex + 1) % teams.length;
  document.getElementById('turnCoin').style.animation = 'none';
  void document.getElementById('turnCoin').offsetWidth;
  document.getElementById('turnCoin').style.animation = 'coinSpin .5s ease';
  renderScoreboard();
}

function openModal(catIdx, qIdx, el){
  if(el.classList.contains('used')) return;
  currentCell = {catIdx, qIdx, el};
  const cat = categories[catIdx];
  const q = cat.questions[qIdx];
  document.getElementById('cardTag').textContent = cat.name;
  document.getElementById('cardPoints').textContent = `$${q.points}`;
  document.getElementById('cardQ').textContent = q.q;
  document.getElementById('answerText').textContent = q.a;
  document.getElementById('answerBox').classList.remove('show');
  document.getElementById('awardSection').classList.remove('show');
  document.getElementById('revealBtn').style.display = 'inline-block';

  const grid = document.getElementById('awardGrid');
  grid.innerHTML = '';
  teams.forEach(t => {
    const b = document.createElement('button');
    b.className = 'award-btn';
    b.textContent = t;
    b.onclick = () => resolveCell(t);
    grid.appendChild(b);
  });

  document.getElementById('overlay').classList.add('show');
}

function revealAnswer(){
  document.getElementById('answerBox').classList.add('show');
  document.getElementById('awardSection').classList.add('show');
  document.getElementById('revealBtn').style.display = 'none';
}

function resolveCell(team){
  if(!currentCell) return;
  const cat = categories[currentCell.catIdx];
  const q = cat.questions[currentCell.qIdx];
  if(team){
    scores[team] += q.points;
  }
  currentCell.el.classList.add('used');
  currentCell.el.textContent = '';
  renderScoreboard();
  closeModal();
  nextTurn();
}

function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  currentCell = null;
}

function resetGame(){
  if(!confirm('¿Reiniciar el marcador y las casillas del juego?')) return;
  teams.forEach(t => scores[t] = 0);
  turnIndex = 0;
  renderBoard();
  renderScoreboard();
}

renderBoard();
renderScoreboard();
</script>
</body>
</html>
